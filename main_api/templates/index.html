<!DOCTYPE html>
<html lang="en">
{% include "head.html" with context %}
<body>

<header>
    <h1>PRACTIX</h1>
    <nav>
        <a href="/">Home</a>
        <a href="#">TV Shows</a>
        <a href="#">Films</a>
        <a href="#">Latest</a>
        <a href="#">My List</a>
    </nav>
</header>

<div class="section">
    <h2>Featured Films</h2>
    <div class="films">
        {% for film in films %}
        <a href="/movies/{{ film.id }}" style="text-decoration: none; color: inherit;">
            <div class="film-card">
                <div
                    class="film-poster"
                    style="background-image: url('{{ film.poster_url or "/static/default_poster.jpg" }}');"
                ></div>
                <div class="film-info">
                    <div class="film-title">{{ film.title }}</div>
                    <div class="film-rating">⭐ {{ film.rating or "N/A" }}</div>
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
</div>

</body>
</html>
