<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ film.title }} | Practix</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef3f6;
            margin: 0;
            padding: 0;
        }

        header {
            background: white;
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            margin-right: 2rem;
            font-size: 1.5rem;
        }

        nav a {
            margin-right: 1.5rem;
            text-decoration: none;
            color: black;
            font-weight: 500;
        }

        .hero {
            position: relative;
            height: 500px;
            color: white;
            display: flex;
            align-items: flex-end;
            padding: 2rem;
            background-size: cover;
            background-position: center;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2));
        }

        .hero-content {
            position: relative;
            max-width: 800px;
            z-index: 2;
        }

        .match-info {
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }

        .match-info span {
            margin-right: 1rem;
        }

        .film-title {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .film-description {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .buttons {
            display: flex;
            gap: 1rem;
        }

        .btn-primary {
            background: #d62828;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #b71c1c;
        }

        .btn-secondary {
            background: white;
            color: black;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .details-section {
            background: white;
            margin: 2rem;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .details-grid {
            display: grid;
            grid-template-columns: 150px 1fr;
            row-gap: 1rem;
        }

        .details-label {
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>

<header>
    <h1>PRACTIX</h1>
    <nav>
        <a href="/">Home</a>
        <a href="#">TV Shows</a>
        <a href="#">Films</a>
        <a href="#">Latest</a>
        <a href="#">My List</a>
    </nav>
</header>

<!-- HERO SECTION -->
<div class="hero"
     style="background-image: url('{{ film.backdrop_url or film.poster_url }}');">

    <div class="hero-content">
        <div class="match-info">
            <span style="color:#4da3ff;">{{ film.match_percent or 95 }}% match</span>
            <span>{{ film.year }}</span>
            <span>{{ film.age_rating }}</span>
            <span>{{ film.duration }}</span>
        </div>

        <div class="film-title">
            {{ film.title }}
        </div>

        <div class="film-description">
            {{ film.description }}
        </div>

        <div class="buttons">
            <button class="btn-primary" onclick="watchTogether(this)">
                🎬 Watch Together
            </button>
            <button class="btn-secondary">
                + Add to My List
            </button>
        </div>
    </div>
</div>

<!-- DETAILS SECTION -->
<div class="details-section">
    <div class="details-grid">
        <div class="details-label">Cast:</div>
        <div>{{ film.cast }}</div>

        <div class="details-label">Genres:</div>
        <div>{{ film.genres }}</div>

        <div class="details-label">Director:</div>
        <div>{{ film.director }}</div>
    </div>
</div>

<script>
    async function watchTogether(btn) {
    btn.disabled = true;
    btn.innerText = "Starting session...";

    try {
        const response = await fetch("http://127.0.0.1:8001/watch-sessions", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ movie_id: "{{ movie_id }}" })
        });

        const data = await response.json();
        window.location.href = `http://127.0.0.1:8001/watch/${data.session_id}`;

    } catch {
        alert("Could not start session.");
        btn.disabled = false;
        btn.innerText = "Watch Together";
    }
}
</script>

</body>
</html>
