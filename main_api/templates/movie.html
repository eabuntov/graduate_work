<!DOCTYPE html>
<html lang="en">
{% include "head.html" with context %}
<body>

<header>
    <h1>PRACTIX</h1>
    <nav>
        <a href="/">Home</a>
        <a href="#">TV Shows</a>
        <a href="#">Films</a>
        <a href="#">Latest</a>
        <a href="#">My List</a>
    </nav>
</header>

<!-- HERO SECTION -->
<div class="hero"
     style="background-image: url('{{ film.backdrop_url or film.poster_url }}');">

    <div class="hero-content">
        <div class="match-info">
            <span style="color:#4da3ff;">{{ film.match_percent or 95 }}% match</span>
            <span>{{ film.year }}</span>
            <span>{{ film.age_rating }}</span>
            <span>{{ film.duration }}</span>
        </div>

        <div class="film-title">
            {{ film.title }}
        </div>

        <div class="film-description">
            {{ film.description }}
        </div>

        <div class="buttons">
            <button class="btn-primary" onclick="watchTogether(this)">
                🎬 Watch Together
            </button>
            <button class="btn-secondary">
                + Add to My List
            </button>
        </div>
    </div>
</div>

<!-- DETAILS SECTION -->
<div class="details-section">
    <div class="details-grid">
        <div class="details-label">Cast:</div>
        <div>{{ film.cast }}</div>

        <div class="details-label">Genres:</div>
        <div>{{ film.genres }}</div>

        <div class="details-label">Director:</div>
        <div>{{ film.director }}</div>
    </div>
</div>

<script>
    async function watchTogether(btn) {
    btn.disabled = true;
    btn.innerText = "Starting session...";

    try {
        const response = await fetch("/ws/watch-session", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ movie_id: "{{ movie_id }}" })
        });

        if (response.redirected) {
            window.location.href = response.url;
            return;
        }

        const data = await response.json();
        window.location.href = `/player/watch/${data.session_id}`;

    } catch {
        btn.disabled = false;
        btn.innerText = "Watch Together";
    }
}
</script>

</body>
</html>
