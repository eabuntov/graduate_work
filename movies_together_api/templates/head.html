<head>
    <meta charset="UTF-8">
    <title>{{ title | default("Practix") }}</title>

    <link href="https://vjs.zencdn.net/8.23.4/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.23.4/video.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef3f6;
            margin: 0;
            padding: 0;
        }

        header {
            background: white;
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            margin-right: 2rem;
            font-size: 1.5rem;
        }

        nav a {
            margin-right: 1.5rem;
            text-decoration: none;
            color: black;
            font-weight: 500;
        }

        .watch-wrapper {
            display: flex;
            gap: 2rem;
            padding: 2rem;
        }

        .video-container {
            flex: 3;
            background: white;
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .video-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .chat-container {
            flex: 1;
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .chat-header {
            padding: 1rem;
            font-size: 1rem;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .chat-message {
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        .chat-message b {
            color: #d62828;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #ddd;
        }

        .chat-input input {
            flex: 1;
            padding: 0.8rem;
            border: none;
            outline: none;
            font-size: 0.9rem;
        }

        .chat-input button {
            padding: 0.8rem 1rem;
            background: #d62828;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }

        .chat-input button:hover {
            background: #b71c1c;
        }

        .video-js {
            width: 100% !important;
            height: 500px !important;
            border-radius: 8px;
            overflow: hidden;
        }
    </style>
</head>
