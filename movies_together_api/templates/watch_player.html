<!DOCTYPE html>
<html lang="en">
{% include "head.html" with context %}
<body>

<header>
    <h1>PRACTIX</h1>
    <nav>
        <a href="/">Home</a>
        <a href="#">TV Shows</a>
        <a href="#">Films</a>
        <a href="#">Latest</a>
        <a href="#">My List</a>
    </nav>
</header>

<div class="watch-wrapper">

    <div class="video-container">
        <div class="video-title">
            {{ movie_title }} — Watch Party
        </div>

        <video
            id="my-video"
            class="video-js vjs-default-skin"
            controls
            preload="auto"
            poster="{{ poster_url }}"
            data-setup="{}"
        >
            <source src="{{ video_url }}" type="video/mp4" />
        </video>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            Live Chat
        </div>

        <div class="chat-messages" id="chat"></div>

        <div class="chat-input">
            <input type="text" id="chat-input" placeholder="Type a message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<script>
const sessionId = "{{ session_id }}";
const protocol = location.protocol === "https:" ? "wss" : "ws";
const ws = new WebSocket(`${protocol}://${location.host}/ws/watch/${encodeURIComponent(sessionId)}`);

const player = videojs('my-video');
const chatBox = document.getElementById("chat");

ws.onopen = () => console.log("WS connected");
ws.onerror = (err) => console.error("WS error", err);
ws.onclose = () => console.log("WS closed");

const chatInput = document.getElementById("chat-input");

chatInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
        event.preventDefault();   // prevents newline / form submit
        sendMessage();
    }
});

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    console.log("WS incoming:", data);

    if (data.type === "sync") {
        const delta = data.position - player.currentTime();

        if (Math.abs(delta) > 0.5) {
            player.currentTime(data.position);
        }

        if (data.is_playing && player.paused()) {
            player.play();
        }

        if (!data.is_playing && !player.paused()) {
            player.pause();
        }
    }

    if (data.type === "chat") {
        const div = document.createElement("div");
        div.className = "chat-message";
        div.textContent = `${data.email}: ${data.message}`;

        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
};

function sendWS(payload) {
    const message = JSON.stringify(payload);
    console.log("WS outgoing:", payload);

    if (ws.readyState === WebSocket.OPEN) {
        ws.send(message);
    } else {
        console.warn("WS not open, message dropped:", payload);
    }
}

player.on('play', () => {
    sendWS({
        type: "play",
        position: player.currentTime()
    });
});

player.on('pause', () => {
    sendWS({
        type: "pause",
        position: player.currentTime()
    });
});

player.on('seeked', () => {
    sendWS({
        type: "seek",
        position: player.currentTime()
    });
});

function sendMessage() {
    const input = document.getElementById("chat-input");
    const text = input.value.trim();
    if (!text) return;

    sendWS({
        type: "chat",
        message: text
    });

    const div = document.createElement("div");
    div.className = "chat-message";
    div.textContent = `me: ${text}`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;

    input.value = "";
}
</script>

</body>
</html>
