<!DOCTYPE html>
<html>
<head>
    <title>{{ movie_title }} - Movies Together</title>

    <link href="https://vjs.zencdn.net/8.23.4/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.23.4/video.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }

        .video-container {
            flex: 3;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            flex: 1;
            background: #1c1c1c;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
        }

        .chat-header {
            padding: 16px;
            font-size: 18px;
            border-bottom: 1px solid #333;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-message {
            margin-bottom: 10px;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #333;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: none;
            background: #2a2a2a;
            color: white;
        }

        .chat-input button {
            padding: 10px 16px;
            background: #ff3d3d;
            border: none;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="video-container">
    <video
        id="my-video"
        class="video-js vjs-default-skin"
        controls
        preload="auto"
        width="960"
        height="540"
        poster="{{ poster_url }}"
        data-setup="{}"
    >
        <source src="{{ video_url }}" type="video/mp4" />
    </video>
</div>

<div class="chat-container">
    <div class="chat-header">
        {{ movie_title }} — Watch Party
    </div>

    <div class="chat-messages" id="chat"></div>

    <div class="chat-input">
        <input type="text" id="chat-input" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const sessionId = "{{ session_id }}";
    const protocol = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${protocol}://${location.host}/ws/watch/${sessionId}`);
    const player = videojs('my-video');
    const chatBox = document.getElementById("chat");

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "sync") {
            const delta = data.position - player.currentTime();
            if (Math.abs(delta) > 0.5) {
                player.currentTime(data.position);
            }

            if (data.is_playing && player.paused()) {
                player.play();
            }

            if (!data.is_playing && !player.paused()) {
                player.pause();
            }
        }

        if (data.type === "chat") {
            const div = document.createElement("div");
            div.className = "chat-message";
            div.innerHTML = `<b>${data.user_id}</b>: ${data.message}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    };

    player.on('play', () => {
        ws.send(JSON.stringify({
            type: "play",
            position: player.currentTime()
        }));
    });

    player.on('pause', () => {
        ws.send(JSON.stringify({
            type: "pause",
            position: player.currentTime()
        }));
    });

    player.on('seeked', () => {
        ws.send(JSON.stringify({
            type: "seek",
            position: player.currentTime()
        }));
    });

    function sendMessage() {
        const input = document.getElementById("chat-input");
        const text = input.value.trim();
        if (!text) return;

        ws.send(JSON.stringify({
            type: "chat",
            message: text
        }));

        input.value = "";
    }
</script>

</body>
</html>
